<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>다니엘 아마츠 학부모 서비스</title>
<link rel="icon" href="icon-192.png">
<style>
:root{
  --sb-house:#0C2A44; --sb-green:#0C2A44; --sb-green-h:#071E31; --sb-dark:#071E31;
  --sb-mint:#D4E9E2; --sb-mint-2:#E8F3EF; --sb-cream:#F2F0EB;
  --gold:#8A6410; --gold-bg:#F7EFD8;
  --white:#FFFFFF; --surface:#FFFFFF; --line:#E3E1DA;
  --ink:#1F2320; --ink-2:#5A6560; --ink-3:#93A09A;
  --ok:#16A34A; --ok-bg:#DCFCE7; --danger:#C0392B; --danger-bg:#FDECEA;
  --info:#2563EB; --info-bg:#DBEAFE;
  --radius:12px;
  --wh:#FFFFFF; --iv:#E4EAEC; --ivd:#CBD5DA; --gm:#0C2A44; --gd:#0C2A44;
  --gp:#E4EAEC; --gl:#C9D6DC; --tl:#7A8A92; --ts:#4A5A62; --gold:#C9A64E;
}
html[data-theme="dark"]{
  color-scheme:dark;
  --sb-house:#05131F; --sb-green:#4A9BC4; --sb-green-h:#6BB5D8; --sb-dark:#4A9BC4;
  --sb-mint:#1C3129; --sb-mint-2:#16241E; --sb-cream:#0C1512;
  --gold:#E3C878; --gold-bg:#2A2416;
  --white:#131F1A; --surface:#131F1A; --line:#26382F;
  --ink:#D8E5DF; --ink-2:#A9BDB4; --ink-3:#6E837A;
  --ok:#3FCB96; --ok-bg:#123326; --danger:#F87171; --danger-bg:#3A1B1B;
  --info:#7EB3FF; --info-bg:#152B4A;
  --wh:#0E1D28; --iv:#0A1721; --ivd:#24363F; --gm:#4A9BC4; --gd:#D6E4EA;
  --gp:#0F2430; --gl:#2A4048; --tl:#7A8E96; --ts:#B8CCD4; --gold:#E0C878;
}
@media (prefers-color-scheme:dark){ html:not([data-theme="light"]){ color-scheme:dark; } }
*{box-sizing:border-box}
body{
  margin:0; min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#050D18; color:#F2EEE4;
  display:flex; align-items:center; justify-content:center; padding:20px;
  -webkit-font-smoothing:antialiased; position:relative; overflow:hidden;
}
/* 성운 밤하늘 배경 (캔버스) */
.sky{ position:fixed; inset:0; z-index:0; pointer-events:none; display:block; width:100%; height:100%; }

.card{
  position:relative; z-index:2;
  width:100%; max-width:400px;
  background:rgba(12,26,40,0.55);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(201,166,78,0.25); border-radius:20px; padding:34px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.brand{ text-align:center; margin-bottom:24px; }
.brand img{ width:64px; height:64px; border-radius:16px; margin-bottom:12px; background:rgba(201,166,78,0.12); border:1px solid rgba(201,166,78,0.35); padding:4px; }
.brand h1{ font-size:19px; font-weight:800; margin:0 0 4px; color:#F2EEE4; }
.brand p{ font-size:13px; color:#A8B8C4; margin:0; }
.step{ display:none; }
.step.on{ display:block; animation:fade .2s ease; }
@keyframes fade{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
label{ display:block; font-size:13px; font-weight:700; color:#C4D2DC; margin:14px 0 6px; }
input[type=email],input[type=text]{
  width:100%; padding:13px 14px; font-size:15px; font-family:inherit;
  border:1.5px solid rgba(201,166,78,0.3); border-radius:10px;
  background:rgba(255,255,255,0.06); color:#F2EEE4; transition:border-color .15s;
}
input::placeholder{ color:#8A9AA6; }
input:focus{ outline:none; border-color:var(--gold); }
.code-input{ letter-spacing:2px; font-weight:800; text-transform:uppercase; }
.btn{
  width:100%; margin-top:18px; padding:14px; font-size:15px; font-weight:800;
  font-family:inherit; border:none; border-radius:10px; cursor:pointer;
  background:linear-gradient(145deg,#C9A64E,#B08D3C); color:#0C2A44; transition:filter .12s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn:hover{ filter:brightness(1.06); }
.btn:disabled{ opacity:.55; cursor:not-allowed; }
.btn-ghost{ background:none; color:#D8C89A; border:1.5px solid rgba(201,166,78,0.4); }
.msg{ font-size:13px; line-height:1.6; color:#C4D2DC; margin:14px 0 0; }
.msg.center{ text-align:center; }
.msg b{ color:#F2EEE4; }
.note{ font-size:12px; color:#8A9AA6; margin-top:8px; line-height:1.6; }
.alert{ font-size:13px; padding:11px 13px; border-radius:9px; margin-top:14px; display:none; }
.alert.on{ display:block; }
.alert.err{ background:rgba(220,80,70,0.18); color:#F5A9A2; border:1px solid rgba(220,80,70,0.35); }
.alert.ok{ background:rgba(80,180,130,0.16); color:#8FE3B8; border:1px solid rgba(80,180,130,0.32); }
.bigicon{ text-align:center; font-size:44px; margin:6px 0 4px; }
.child-list{ margin:14px 0 0; }
.child-chip{
  display:inline-flex; align-items:center; gap:6px; background:rgba(201,166,78,0.12);
  color:#E0C878; border:1px solid rgba(201,166,78,0.4); border-radius:100px;
  padding:6px 13px; font-size:13.5px; font-weight:700; margin:0 6px 6px 0;
}
.foot{ text-align:center; margin-top:22px; font-size:12px; color:#8A9AA6; }
.foot a{ color:#D8C89A; text-decoration:none; font-weight:700; }
.spin{ width:18px; height:18px; border:2.5px solid rgba(12,42,68,.4); border-top-color:#0C2A44; border-radius:50%; animation:sp .6s linear infinite; }
@keyframes sp{ to{transform:rotate(360deg)} }
</style>
</head>
<body>
<canvas class="sky" id="skyCanvas" aria-hidden="true"></canvas>
<div class="card">
  <div class="brand">
    <img src="logo-daniel.png" alt="다니엘 아마츠" onerror="this.style.display='none'">
    <h1>다니엘 아마츠</h1>
    <p>학부모 서비스</p>
  </div>

  <!-- STEP 1: 이메일 입력 -->
  <div class="step on" id="step-email">
    <label for="email">이메일 주소</label>
    <input type="email" id="email" placeholder="parent@example.com" autocomplete="email" inputmode="email">
    <div class="alert err" id="email-err"></div>
    <button class="btn" id="btn-send" onclick="sendLink()">
      <span>로그인 링크 받기</span>
    </button>
    <p class="note">비밀번호가 없습니다. 입력하신 이메일로 로그인 링크를 보내드립니다. 링크를 누르면 로그인돼요.</p>
  </div>

  <!-- STEP 2: 메일 확인 대기 -->
  <div class="step" id="step-sent">
    <div class="bigicon">📬</div>
    <p class="msg center"><b id="sent-email"></b> 주소로<br>로그인 링크를 보냈어요.</p>
    <p class="msg center">받은 메일에서 <b>로그인 링크</b>를 눌러주세요.<br>이 창은 그대로 두셔도 됩니다.</p>
    <p class="note center">메일이 안 보이면 스팸함을 확인하거나, 잠시 후 다시 시도해 주세요.</p>
    <button class="btn btn-ghost" onclick="backToEmail()">다른 이메일로 다시 받기</button>
  </div>

  <!-- STEP 3: 로그인 처리 중 -->
  <div class="step" id="step-verify">
    <div class="bigicon">🔓</div>
    <p class="msg center">로그인 중입니다…</p>
  </div>

  <!-- STEP 4: 자녀 연결 -->
  <div class="step" id="step-link">
    <div class="bigicon">👨‍👩‍👧</div>
    <p class="msg center" id="link-hello">로그인되었습니다.<br>자녀를 연결해 주세요.</p>
    <div class="child-list" id="child-list"></div>
    <label for="code">자녀 가입코드</label>
    <input type="text" id="code" class="code-input" placeholder="예: DA-3B-7K2P" autocapitalize="characters" autocomplete="off">
    <div class="alert err" id="code-err"></div>
    <div class="alert ok" id="code-ok"></div>
    <button class="btn" id="btn-link" onclick="linkChild()">
      <span>자녀 연결하기</span>
    </button>
    <p class="note">학교에서 받은 자녀별 가입코드를 입력하세요. 자녀가 여럿이면 하나씩 연결할 수 있어요.</p>
    <button class="btn btn-ghost" id="btn-go-home" style="display:none" onclick="goHome()">홈으로 이동 →</button>
  </div>

  <div class="foot">
    <a href="index.html">← 공개 홈페이지로</a>
  </div>
</div>

<script>
/* ── 깊고 고요한 우주 배경 (프랙탈 성운 + 별) ── */
(function(){
  const cv=document.getElementById('skyCanvas'); if(!cv) return;
  const ctx=cv.getContext('2d'); let W,H,DPR,nebulaCanvas,stars=[];
  function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
  const rnd=mulberry(20260721);
  const P=new Uint8Array(512),perm=[];for(let i=0;i<256;i++)perm[i]=i;
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0;const tmp=perm[i];perm[i]=perm[j];perm[j]=tmp;}
  for(let i=0;i<512;i++)P[i]=perm[i&255];
  const fade=t=>t*t*t*(t*(t*6-15)+10), lerp=(a,b,t)=>a+t*(b-a);
  function grad(h,x,y){const u=(h&1)?x:-x,v=(h&2)?y:-y;return u+v;}
  function noise(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fade(x),v=fade(y);const a=P[X]+Y,b=P[X+1]+Y;return lerp(lerp(grad(P[a],x,y),grad(P[b],x-1,y),u),lerp(grad(P[a+1],x,y-1),grad(P[b+1],x-1,y-1),u),v);}
  function fbm(x,y){let s=0,amp=0.5,f=1;for(let i=0;i<5;i++){s+=amp*noise(x*f,y*f);f*=2;amp*=0.5;}return s;}
  function build(){
    const nw=Math.max(2,Math.ceil(W/4)), nh=Math.max(2,Math.ceil(H/4));
    nebulaCanvas=document.createElement('canvas'); nebulaCanvas.width=nw; nebulaCanvas.height=nh;
    const nc=nebulaCanvas.getContext('2d'), img=nc.createImageData(nw,nh), d=img.data;
    const cols=[[40,70,110],[30,50,90],[60,45,95],[90,75,60]];
    for(let y=0;y<nh;y++)for(let x=0;x<nw;x++){
      const nx=x/nw, ny=y/nh; let dens=0;
      dens+=Math.max(0,0.9-Math.hypot(nx-0.72,ny-0.22)*1.7);
      dens+=Math.max(0,0.7-Math.hypot(nx-0.2,ny-0.62)*1.9);
      dens+=Math.max(0,0.5-Math.hypot(nx-0.5,ny-0.85)*2.1);
      const turb=fbm(nx*3.2+10,ny*3.2+4)*0.5+0.5, wisp=fbm(nx*7+2,ny*7+9)*0.5+0.5;
      let a=dens*turb*turb*1.5*(0.5+wisp*0.8); a=Math.max(0,Math.min(1,a));
      const cm=(fbm(nx*2+30,ny*2+7)*0.5+0.5)*(cols.length-1);
      const ci=Math.floor(cm), cf=cm-ci, c0=cols[ci], c1=cols[Math.min(ci+1,cols.length-1)];
      const i=(y*nw+x)*4;
      d[i]=c0[0]+(c1[0]-c0[0])*cf; d[i+1]=c0[1]+(c1[1]-c0[1])*cf; d[i+2]=c0[2]+(c1[2]-c0[2])*cf; d[i+3]=a*135;
    }
    nc.putImageData(img,0,0);
    stars=[]; const n=Math.floor(W*H/2600);
    for(let i=0;i<n;i++){
      const bright=Math.pow(rnd(),3); let cr=235,cg=242,cb=255; const t=rnd();
      if(t>0.85){cr=255;cg=240;cb=205;} else if(t>0.6){cr=200;cg=220;cb=255;}
      stars.push({x:rnd()*W,y:rnd()*H,r:(0.4+bright*1.9)*DPR,a:0.35+bright*0.65,cr,cg,cb,spike:bright>0.75,tw:rnd()*Math.PI*2,tws:0.5+rnd()*1.5});
    }
  }
  function drawStar(s,glow){
    ctx.save(); ctx.globalAlpha=s.a*glow; ctx.fillStyle='rgb('+s.cr+','+s.cg+','+s.cb+')';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill();
    const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*4);
    g.addColorStop(0,'rgba('+s.cr+','+s.cg+','+s.cb+','+(0.5*glow)+')'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=1; ctx.fillStyle=g; ctx.beginPath(); ctx.arc(s.x,s.y,s.r*4,0,7); ctx.fill();
    if(s.spike){ ctx.globalAlpha=0.5*glow; ctx.strokeStyle='rgba('+s.cr+','+s.cg+','+s.cb+',1)'; ctx.lineWidth=0.7*DPR; const L=s.r*7;
      ctx.beginPath(); ctx.moveTo(s.x-L,s.y); ctx.lineTo(s.x+L,s.y); ctx.moveTo(s.x,s.y-L); ctx.lineTo(s.x,s.y+L); ctx.stroke(); }
    ctx.restore();
  }
  function frame(t){
    t*=0.001;
    const bg=ctx.createRadialGradient(W*0.72,H*0.18,0,W*0.72,H*0.18,Math.max(W,H)*1.1);
    bg.addColorStop(0,'#0C2036'); bg.addColorStop(0.4,'#071426'); bg.addColorStop(0.75,'#040A16'); bg.addColorStop(1,'#02040A');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
    if(nebulaCanvas){ ctx.imageSmoothingEnabled=true; ctx.drawImage(nebulaCanvas,0,0,W,H); }
    const glow=ctx.createRadialGradient(W*0.72,H*0.1,0,W*0.72,H*0.1,H*0.7);
    glow.addColorStop(0,'rgba(230,215,170,0.10)'); glow.addColorStop(0.5,'rgba(230,215,170,0.03)'); glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.fillRect(0,0,W,H);
    for(const s of stars){ const tw=0.7+0.3*Math.sin(t*s.tws+s.tw); drawStar(s,tw); }
    requestAnimationFrame(frame);
  }
  function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR; cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px'; build(); }
  addEventListener('resize',resize); resize(); requestAnimationFrame(frame);
})();
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink,
         onAuthStateChanged, setPersistence, browserLocalPersistence }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs,
         addDoc, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtgr79jKqkec6HwqkxYNxSubWAhfEkM7g",
  authDomain: "daniel-amatz.firebaseapp.com",
  projectId: "daniel-amatz",
  storageBucket: "daniel-amatz.firebasestorage.app",
  messagingSenderId: "455744290312",
  appId: "1:455744290312:web:3ce7e7d3e58f6f1d185bbd",
  measurementId: "G-E91V0S88T8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});

const EMAIL_KEY = 'gyosa_parent_email';
const $ = id => document.getElementById(id);
const show = id => { document.querySelectorAll('.step').forEach(s=>s.classList.remove('on')); $(id).classList.add('on'); };
const alertShow = (id, msg) => { const e=$(id); e.textContent=msg; e.classList.add('on'); };
const alertHide = id => $(id).classList.remove('on');

function validEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

// ── STEP 1: 로그인 링크 발송 ──
window.sendLink = async function(){
  alertHide('email-err');
  const email = $('email').value.trim().toLowerCase();
  if(!validEmail(email)){ alertShow('email-err','올바른 이메일 주소를 입력해 주세요.'); return; }
  const btn = $('btn-send'); btn.disabled = true;
  const orig = btn.innerHTML; btn.innerHTML = '<span class="spin"></span>';
  try {
    const actionCodeSettings = { url: location.origin + location.pathname, handleCodeInApp: true };
    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
    localStorage.setItem(EMAIL_KEY, email);
    // 인증 요청 로그 (관리자 모니터링용)
    try {
      await addDoc(collection(db,'parentAuthLogs'), {
        email, requestedAt: Timestamp.now(), clicked:false,
        ua: navigator.userAgent || ''
      });
    } catch(e){}
    $('sent-email').textContent = email;
    show('step-sent');
  } catch(e){
    alertShow('email-err', '링크 발송에 실패했습니다: ' + (e.code || e.message));
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
  }
};

window.backToEmail = function(){ show('step-email'); };

// ── STEP 3: 링크로 돌아왔을 때 로그인 처리 ──
async function completeSignInFromLink(){
  if(!isSignInWithEmailLink(auth, location.href)) return false;
  show('step-verify');
  let email = localStorage.getItem(EMAIL_KEY);
  if(!email){
    email = window.prompt('로그인을 완료하려면 링크를 요청한 이메일을 다시 입력해 주세요.');
    if(email) email = email.trim().toLowerCase();
  }
  if(!email){ show('step-email'); return true; }
  try {
    await signInWithEmailLink(auth, email, location.href);
    localStorage.removeItem(EMAIL_KEY);
    // 로그인 성공 로그 갱신
    try {
      const q = query(collection(db,'parentAuthLogs'), where('email','==',email), where('clicked','==',false));
      const snap = await getDocs(q);
      const latest = snap.docs.sort((a,b)=>(b.data().requestedAt?.seconds||0)-(a.data().requestedAt?.seconds||0))[0];
      if(latest) await updateDoc(doc(db,'parentAuthLogs',latest.id), { clicked:true, clickedAt:Timestamp.now() });
    } catch(e){}
    history.replaceState(null,'',location.pathname);   // URL의 인증 파라미터 제거
  } catch(e){
    show('step-email');
    alertShow('email-err','로그인에 실패했습니다. 링크가 만료되었을 수 있어요. 다시 시도해 주세요.');
    return true;
  }
  return true;
}

// ── 부모 프로필 보장 + 자녀 연결 현황 ──
async function ensureParentDoc(user){
  const ref = doc(db,'parents',user.uid);
  const s = await getDoc(ref);
  if(!s.exists()){
    await setDoc(ref, {
      uid:user.uid, email:user.email||'', role:'parent',
      createdAt:Timestamp.now(), lastSeen:Timestamp.now()
    });
  } else {
    try { await updateDoc(ref, { lastSeen:Timestamp.now() }); } catch(e){}
  }
}

async function myActiveChildren(uid){
  const out = [];
  try {
    const q = query(collection(db,'parentLinks'), where('parentUid','==',uid), where('status','==','active'));
    const snap = await getDocs(q);
    snap.forEach(d => out.push(d.data()));
  } catch(e){}
  return out;
}

function renderChildren(children){
  const box = $('child-list');
  if(!children.length){ box.innerHTML=''; $('btn-go-home').style.display='none'; return; }
  box.innerHTML = '<div style="font-size:12px;color:var(--tl);margin-bottom:8px">연결된 자녀</div>'
    + children.map(c=>`<span class="child-chip">👦 ${c.studentName||'학생'}</span>`).join('');
  $('btn-go-home').style.display='flex';
}

// ── STEP 4: 가입코드로 자녀 연결 ──
window.linkChild = async function(){
  alertHide('code-err'); alertHide('code-ok');
  const user = auth.currentUser;
  if(!user){ alertShow('code-err','로그인이 필요합니다.'); return; }
  const code = $('code').value.trim().toUpperCase();
  if(!code){ alertShow('code-err','가입코드를 입력해 주세요.'); return; }

  const btn = $('btn-link'); btn.disabled = true;
  const orig = btn.innerHTML; btn.innerHTML = '<span class="spin"></span>';
  try {
    const cSnap = await getDoc(doc(db,'joinCodes',code));
    if(!cSnap.exists() || cSnap.data().active === false){
      alertShow('code-err','유효하지 않은 코드입니다. 학교에서 받은 코드를 다시 확인해 주세요.');
      return;
    }
    const cd = cSnap.data();
    // 연결 저장 (setDoc은 있으면 덮어쓰기 — 중복 연결도 안전)
    const linkId = `${user.uid}_${cd.studentId}`;
    await setDoc(doc(db,'parentLinks',linkId), {
      parentUid:user.uid, parentEmail:user.email||'',
      studentId:cd.studentId, studentName:cd.studentName||'', org:cd.org||'',
      status:'active', linkedVia:'code', linkedAt:Timestamp.now()
    });
    alertShow('code-ok', `${cd.studentName} 연결 완료!`);
    $('code').value = '';
    renderChildren(await myActiveChildren(user.uid));
  } catch(e){
    alertShow('code-err','연결에 실패했습니다: ' + (e.code || e.message));
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
  }
};

window.goHome = function(){ location.href = 'home.html'; };

// ── 시작 ──
(async () => {
  const handled = await completeSignInFromLink();

  onAuthStateChanged(auth, async (user) => {
    if(user){
      await ensureParentDoc(user);
      const children = await myActiveChildren(user.uid);
      if(children.length && !handled){
        // 이미 연결된 자녀가 있는 재방문자 → 바로 홈
        location.href = 'home.html';
        return;
      }
      // 로그인은 됐지만 연결 화면을 보여줌 (신규 또는 링크 직후)
      $('link-hello').innerHTML = children.length
        ? '로그인되었습니다.<br>자녀를 추가하거나 홈으로 이동하세요.'
        : '로그인되었습니다.<br>자녀를 연결해 주세요.';
      renderChildren(children);
      show('step-link');
    } else {
      if(!handled) show('step-email');
    }
  });
})();
</script>
